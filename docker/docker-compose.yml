name: floway

services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: server
    environment:
      ADMIN_KEY: ${ADMIN_KEY:?set ADMIN_KEY}
      FLOWAY_DB_PATH: /data/floway.db
      FLOWAY_FILES_DIR: /data/files
      PORT: 8788
    volumes:
      - floway-data:/data
    ports:
      - "${FLOWAY_SERVER_PORT:-8788}:8788"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8788/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${FLOWAY_WEB_PORT:-18088}:80"
    restart: unless-stopped

volumes:
  floway-data:
